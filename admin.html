<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rival in Retro — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Firebase SDK (compat v9) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
/* ═══════════════════════════════════════════
   ROOT / TOKENS
═══════════════════════════════════════════ */
:root{
  --bg:#080808;
  --s0:#0f0f0f;
  --s1:#141414;
  --s2:#1a1a1a;
  --s3:#222;
  --border:#252525;
  --border2:#2e2e2e;
  --gold:#c8a84b;
  --gold2:#e2c96a;
  --gold-dim:rgba(200,168,75,.12);
  --gold-dim2:rgba(200,168,75,.06);
  --text:#f0ede6;
  --muted:#888;
  --dim:#444;
  --danger:#e05252;
  --danger-dim:rgba(224,82,82,.12);
  --success:#4caf8a;
  --success-dim:rgba(76,175,138,.12);
  --wa:#25D366;
  --sidebar:220px;
  --topbar:58px;
  --radius:2px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:14px;line-height:1.5;
}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--s0);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--dim);}

/* ═══════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════ */
#shell{display:flex;height:100vh;}

/* SIDEBAR */
#sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--s0);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;z-index:50;
}
.sb-logo{
  padding:1.4rem 1.3rem 1rem;
  border-bottom:1px solid var(--border);
}
.sb-logo-mark{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.25rem;letter-spacing:2.5px;
  line-height:1;
}
.sb-logo-mark em{color:var(--gold);font-style:normal;}
.sb-logo-sub{
  font-size:.6rem;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;
  margin-top:.25rem;
}
.sb-nav{flex:1;overflow-y:auto;padding:.6rem 0;}
.sb-group-label{
  font-size:.58rem;color:var(--dim);
  text-transform:uppercase;letter-spacing:2px;
  padding:.8rem 1.2rem .3rem;
}
.sb-item{
  display:flex;align-items:center;gap:.65rem;
  padding:.65rem 1.2rem;
  color:var(--muted);
  font-size:.82rem;font-weight:500;
  cursor:pointer;transition:all .15s;
  border-left:2px solid transparent;
  user-select:none;
}
.sb-item:hover{color:var(--text);background:var(--s1);}
.sb-item.active{
  color:var(--gold);border-left-color:var(--gold);
  background:var(--gold-dim);
}
.sb-item svg{width:15px;height:15px;flex-shrink:0;}
.sb-badge{
  margin-left:auto;background:var(--gold);color:#000;
  font-size:.58rem;font-weight:800;
  padding:.1rem .4rem;letter-spacing:.5px;
  min-width:18px;text-align:center;
}
.sb-footer{
  border-top:1px solid var(--border);
  padding:1rem 1.2rem;
}
.sb-footer-text{font-size:.68rem;color:var(--dim);}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* TOPBAR */
#topbar{
  height:var(--topbar);flex-shrink:0;
  background:var(--s0);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.8rem;gap:1rem;
}
.topbar-left{display:flex;align-items:center;gap:.5rem;}
.page-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.2rem;letter-spacing:1.5px;color:var(--text);
}
.page-sub{font-size:.72rem;color:var(--muted);margin-top:.05rem;}
.topbar-right{display:flex;align-items:center;gap:.6rem;}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:1.8rem;}

/* ═══════════════════════════════════════════
   COMMON COMPONENTS
═══════════════════════════════════════════ */
/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.55rem 1.1rem;
  font-family:'DM Sans',sans-serif;
  font-size:.78rem;font-weight:600;
  letter-spacing:.3px;text-transform:uppercase;
  border:none;cursor:pointer;transition:all .18s;
  white-space:nowrap;
}
.btn-primary{background:var(--gold);color:#000;}
.btn-primary:hover{background:var(--gold2);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);}
.btn-danger{background:var(--danger-dim);color:var(--danger);border:1px solid transparent;}
.btn-danger:hover{background:var(--danger);color:#fff;}
.btn-success{background:var(--success-dim);color:var(--success);border:1px solid transparent;}
.btn-success:hover{background:var(--success);color:#fff;}
.btn-sm{padding:.35rem .75rem;font-size:.7rem;}
.btn-icon{padding:.5rem;aspect-ratio:1;}

/* Cards */
.card{
  background:var(--s1);border:1px solid var(--border);
  padding:1.4rem;
}
.card-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:1rem;letter-spacing:1px;
  margin-bottom:1rem;
}

/* Stat cards */
.stat-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1rem;margin-bottom:1.6rem;
}
.stat-card{
  background:var(--s1);border:1px solid var(--border);
  padding:1.2rem 1.4rem;
  display:flex;align-items:flex-start;justify-content:space-between;
}
.stat-card:hover{border-color:var(--border2);}
.stat-n{
  font-family:'Bebas Neue',sans-serif;
  font-size:2rem;letter-spacing:1px;color:var(--gold);
}
.stat-l{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:.15rem;}
.stat-icon{font-size:1.4rem;opacity:.4;}

/* Tables */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{
  font-size:.62rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:1.5px;
  padding:.65rem 1rem;
  border-bottom:1px solid var(--border);
  text-align:left;white-space:nowrap;
  background:var(--s0);font-weight:600;
}
td{
  padding:.7rem 1rem;
  border-bottom:1px solid var(--border);
  font-size:.83rem;vertical-align:middle;
}
tr:hover td{background:var(--s2);}
tr:last-child td{border-bottom:none;}
.td-actions{display:flex;gap:.4rem;align-items:center;}

/* Badges */
.badge{
  display:inline-flex;align-items:center;
  font-size:.6rem;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;
  padding:.18rem .55rem;
}
.badge-gold{background:var(--gold-dim);color:var(--gold);}
.badge-success{background:var(--success-dim);color:var(--success);}
.badge-danger{background:var(--danger-dim);color:var(--danger);}
.badge-muted{background:var(--s3);color:var(--muted);}

/* Forms */
.form-grid{display:grid;gap:1rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;}
.field{display:flex;flex-direction:column;gap:.4rem;}
.field label{
  font-size:.65rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:1.5px;font-weight:600;
}
.field input,.field select,.field textarea{
  background:var(--s0);border:1px solid var(--border);
  color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:.85rem;padding:.7rem .9rem;
  outline:none;transition:border-color .18s;width:100%;
}
.field input:focus,.field select,.field textarea:focus{
  border-color:var(--gold);
}
.field select{cursor:pointer;}
.field textarea{resize:vertical;min-height:90px;}
.field input::placeholder,.field textarea::placeholder{color:var(--dim);}

/* Checkbox group */
.check-group{display:flex;flex-wrap:wrap;gap:.5rem;}
.check-pill{
  display:flex;align-items:center;gap:.35rem;
  background:var(--s2);border:1px solid var(--border);
  padding:.4rem .8rem;cursor:pointer;transition:all .15s;
  font-size:.78rem;
  user-select:none;
}
.check-pill:hover{border-color:var(--border2);}
.check-pill.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
.check-pill input{display:none;}

/* Search */
.search-wrap{
  display:flex;align-items:center;
  background:var(--s2);border:1px solid var(--border);
  padding:0 .8rem;gap:.5rem;flex:1;max-width:300px;
}
.search-wrap svg{color:var(--dim);flex-shrink:0;}
.search-wrap input{
  background:none;border:none;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:.83rem;
  padding:.55rem 0;outline:none;width:100%;
}

/* Toolbar */
.toolbar{
  display:flex;align-items:center;gap:.6rem;
  margin-bottom:1.2rem;flex-wrap:wrap;
}
.toolbar-right{margin-left:auto;display:flex;gap:.5rem;}

/* Empty state */
.empty{
  text-align:center;padding:4rem 2rem;
  border:1px dashed var(--border2);
}
.empty-icon{font-size:2.5rem;opacity:.3;margin-bottom:1rem;}
.empty-txt{color:var(--muted);font-size:.85rem;}

/* Product thumbnail */
.prod-thumb{
  width:44px;height:44px;
  background:var(--s3);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;font-size:1.2rem;
}
.prod-thumb img{width:100%;height:100%;object-fit:cover;}

/* Jersey SVG preview */
.jersey-mini{
  width:44px;height:48px;
  display:flex;align-items:center;justify-content:center;
}

/* Price display */
.price-display{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
.mrp-val{font-size:.78rem;color:var(--dim);text-decoration:line-through;}
.sale-val{font-size:.95rem;font-weight:700;}
.disc-tag{
  font-size:.6rem;font-weight:800;
  background:var(--gold-dim);color:var(--gold);
  padding:.1rem .4rem;
}

/* Discount calc display */
.disc-calc{
  background:var(--gold-dim2);border:1px solid rgba(200,168,75,.15);
  padding:.65rem .9rem;
  display:flex;justify-content:space-between;align-items:center;
}
.disc-calc-label{font-size:.68rem;color:var(--muted);}
.disc-calc-val{font-size:1.1rem;font-weight:700;color:var(--gold);}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.88);backdrop-filter:blur(6px);
  display:flex;align-items:flex-start;justify-content:center;
  padding:2rem 1rem;overflow-y:auto;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--s1);border:1px solid var(--border2);
  width:100%;max-width:780px;
  transform:translateY(20px);transition:transform .3s cubic-bezier(.25,.8,.25,1);
  flex-shrink:0;
}
.overlay.open .modal{transform:translateY(0);}
.modal-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 1.6rem;
  border-bottom:1px solid var(--border);
}
.modal-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.15rem;letter-spacing:1px;
}
.modal-sub{font-size:.68rem;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;}
.modal-close{
  background:none;border:1px solid var(--border);
  color:var(--muted);width:30px;height:30px;
  font-size:.9rem;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;
}
.modal-close:hover{border-color:var(--text);color:var(--text);}
.modal-body{padding:1.6rem;}
.modal-ft{
  border-top:1px solid var(--border);
  padding:1rem 1.6rem;
  display:flex;justify-content:flex-end;gap:.6rem;
}

/* ═══════════════════════════════════════════
   IMAGE UPLOAD
═══════════════════════════════════════════ */
.img-upload-area{
  border:2px dashed var(--border2);
  padding:2rem;text-align:center;cursor:pointer;
  transition:all .2s;background:var(--s0);
}
.img-upload-area:hover,.img-upload-area.drag{
  border-color:var(--gold);background:var(--gold-dim2);
}
.img-upload-icon{font-size:2rem;opacity:.4;margin-bottom:.5rem;}
.img-upload-txt{font-size:.8rem;color:var(--muted);}
.img-upload-txt span{color:var(--gold);text-decoration:underline;}
.img-grid{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:.8rem;}
.img-item{
  width:80px;height:80px;
  background:var(--s2);border:1px solid var(--border);
  position:relative;overflow:hidden;cursor:pointer;
}
.img-item img{width:100%;height:100%;object-fit:cover;}
.img-item.featured{border-color:var(--gold);}
.img-item .img-del{
  position:absolute;top:2px;right:2px;
  background:rgba(0,0,0,.8);border:none;
  color:var(--danger);width:18px;height:18px;
  font-size:.75rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.img-item .img-star{
  position:absolute;bottom:2px;left:2px;
  background:rgba(0,0,0,.8);border:none;
  color:var(--dim);width:18px;height:18px;
  font-size:.65rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.img-item.featured .img-star{color:var(--gold);}
.img-item .img-featured-label{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--gold);color:#000;
  font-size:.52rem;font-weight:800;
  text-align:center;letter-spacing:1px;
  padding:.1rem;
}

/* ═══════════════════════════════════════════
   SECTION MANAGER
═══════════════════════════════════════════ */
.section-tabs{
  display:flex;gap:.3rem;margin-bottom:1.4rem;
  border-bottom:1px solid var(--border);
}
.section-tab{
  padding:.65rem 1.2rem;
  font-size:.75rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;
  color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .18s;margin-bottom:-1px;
}
.section-tab:hover{color:var(--text);}
.section-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

.section-columns{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.section-pool{background:var(--s0);border:1px solid var(--border);padding:1rem;}
.section-pool-title{
  font-size:.62rem;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--muted);
  margin-bottom:.8rem;font-weight:600;
}
.pool-list{min-height:200px;display:flex;flex-direction:column;gap:.35rem;}
.pool-item{
  display:flex;align-items:center;gap:.65rem;
  background:var(--s2);border:1px solid var(--border);
  padding:.55rem .75rem;
  cursor:grab;transition:all .15s;
  user-select:none;
}
.pool-item:active{cursor:grabbing;}
.pool-item.dragging{opacity:.4;}
.pool-item.drag-over{border-color:var(--gold);background:var(--gold-dim2);}
.pool-item-drag{color:var(--dim);flex-shrink:0;font-size:1rem;}
.pool-item-name{font-size:.8rem;flex:1;line-height:1.3;}
.pool-item-cat{font-size:.6rem;color:var(--dim);}
.pool-item-btn{
  background:none;border:none;cursor:pointer;
  padding:.25rem;transition:color .15s;
  display:flex;align-items:center;
}
.pool-item-btn.add-btn{color:var(--success);}
.pool-item-btn.add-btn:hover{color:#6fd4a8;}
.pool-item-btn.rem-btn{color:var(--danger);}
.pool-item-btn.rem-btn:hover{color:#f07070;}

/* ═══════════════════════════════════════════
   SETTINGS
═══════════════════════════════════════════ */
.settings-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:1.4rem;}
.settings-section-title{
  font-size:.6rem;color:var(--gold);
  text-transform:uppercase;letter-spacing:2px;
  margin-bottom:1rem;font-weight:700;
}
.wa-preview{
  background:var(--s0);border:1px solid var(--border);
  padding:1.2rem;font-family:'DM Mono',monospace;
  font-size:.75rem;color:var(--muted);
  line-height:1.8;white-space:pre-wrap;
}
.wa-preview .highlight{color:var(--gold);}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
#toast-wrap{
  position:fixed;bottom:1.5rem;right:1.5rem;
  z-index:999;display:flex;flex-direction:column;gap:.5rem;
}
.toast{
  background:var(--s2);border-left:3px solid var(--gold);
  padding:.8rem 1.2rem;
  font-size:.8rem;
  transform:translateX(120%);transition:transform .3s cubic-bezier(.25,.8,.25,1);
  min-width:220px;max-width:320px;
  display:flex;align-items:center;gap:.6rem;
}
.toast.show{transform:translateX(0);}
.toast.t-success{border-left-color:var(--success);}
.toast.t-danger{border-left-color:var(--danger);}

/* ═══════════════════════════════════════════
   CONFIRM DIALOG
═══════════════════════════════════════════ */
#confirm-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.85);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
#confirm-overlay.open{opacity:1;pointer-events:all;}
.confirm-box{
  background:var(--s1);border:1px solid var(--border2);
  padding:2rem;max-width:360px;width:90%;text-align:center;
}
.confirm-icon{font-size:2rem;margin-bottom:.75rem;}
.confirm-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:1px;margin-bottom:.4rem;}
.confirm-txt{font-size:.83rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6;}
.confirm-btns{display:flex;gap:.6rem;justify-content:center;}

/* ═══════════════════════════════════════════
   PRODUCT LIST CARD (grid view option)
═══════════════════════════════════════════ */
.prod-list-img{
  width:56px;height:56px;flex-shrink:0;
  background:var(--s3);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.prod-list-img img{width:100%;height:100%;object-fit:cover;}

/* ═══════════════════════════════════════════
   DRAG GHOST PREVENTION
═══════════════════════════════════════════ */
.no-select{user-select:none;}

/* ═══════════════════════════════════════════
   WELCOME BANNER
═══════════════════════════════════════════ */
.welcome-banner{
  background:linear-gradient(135deg,var(--s1) 0%,var(--s2) 100%);
  border:1px solid var(--border);
  border-left:3px solid var(--gold);
  padding:1.2rem 1.6rem;
  margin-bottom:1.4rem;
  display:flex;align-items:center;justify-content:space-between;
}
.wb-text h2{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.2rem;letter-spacing:1.5px;
  margin-bottom:.2rem;
}
.wb-text p{font-size:.78rem;color:var(--muted);}

/* ═══════════════════════════════════════════
   CATEGORY COLOR DOTS
═══════════════════════════════════════════ */
.cat-dot{
  width:8px;height:8px;border-radius:50%;
  display:inline-block;flex-shrink:0;
}

/* ═══════════════════════════════════════════
   PRIORITY INPUT
═══════════════════════════════════════════ */
.priority-input{
  width:60px;background:var(--s0);
  border:1px solid var(--border);
  color:var(--text);font-family:'DM Mono',monospace;
  font-size:.78rem;padding:.3rem .5rem;
  text-align:center;outline:none;
}
.priority-input:focus{border-color:var(--gold);}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media(max-width:900px){
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .section-columns{grid-template-columns:1fr;}
  .settings-grid{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr;}
  .form-row-3{grid-template-columns:1fr 1fr;}
}
@media(max-width:640px){
  :root{--sidebar:0px;}
  #sidebar{display:none;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  .form-row-3{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     SHELL
══════════════════════════════════════════ -->
<div id="shell">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-mark">RIVAL <em>IN</em> RETRO</div>
      <div class="sb-logo-sub">Admin Panel</div>
    </div>

    <nav class="sb-nav">

}, err => console.error('Settings error:', err));

/* ─── FIRESTORE: WRITE HELPERS ───────────────────────── */
async function fbSaveProduct(p){
  const id = p.id || 'p'+Date.now();
  const doc = { ...p, id };
  await PROD_COL.doc(id).set(doc);
  return id;
}
async function fbDeleteProduct(id){ await PROD_COL.doc(id).delete(); }
async function fbSaveSettings(s){ await SETTINGS_DOC.set(s); }

/* ─── IMAGE COMPRESSION (keeps Firestore docs small) ─── */
async function compressImage(dataURL, maxW=600, quality=0.75){
  return new Promise(res=>{
    const img=new Image(); img.src=dataURL;
    img.onload=()=>{
      const ratio=Math.min(1,maxW/img.width);
      const c=document.createElement('canvas');
      c.width=img.width*ratio; c.height=img.height*ratio;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>res(dataURL);
  });
}

async function seedIfEmpty(){
  const snap = await PROD_COL.limit(1).get();
  if(!snap.empty) return; // already has data
  showSeedingBanner();
  const batch = db.batch();
  SEED_PRODUCTS.forEach(p => batch.set(PROD_COL.doc(p.id), p));
  batch.set(SETTINGS_DOC, { wa:'919999999999', brand:'Rival in Retro' });
  await batch.commit();
  hideSeedingBanner();
  toast('Store seeded with 35 demo products!','success');
}

function renderSections(){

  const c = document.getElementById('content');

function switchSectionTab(id){
  activeSectionTab = id;
  document.querySelectorAll('.section-tab').forEach((t,i)=>{
    t.classList.toggle('active', SECTIONS[i].id===id);
  });
  renderSectionBody();
}

function renderSectionBody(){
  const prods = getProducts();
  const inSection  = prods.filter(p=>(p.sections||[]).includes(activeSectionTab)).sort((a,b)=>(a.priority||99)-(b.priority||99));
  const notSection = prods.filter(p=>!(p.sections||[]).includes(activeSectionTab));

  document.getElementById('section-body').innerHTML = `
  <p style="font-size:.78rem;color:var(--muted);margin-bottom:1rem">
    Drag to reorder jerseys inside the section. Use ➕ to add a jersey, ✕ to remove.
  </p>
  <div class="section-columns">
    <div class="section-pool">
      <div class="section-pool-title">IN THIS SECTION (${inSection.length})</div>
      <div class="pool-list" id="pool-in" ondragover="poolDragOver(event)" ondrop="poolDrop(event,'in')">
        ${inSection.length?inSection.map((p,i)=>poolItem(p,true,i)).join(''):`<div class="empty" style="padding:2rem"><div class="empty-txt">No jerseys in this section yet</div></div>`}
      </div>
    </div>
    <div class="section-pool">
      <div class="section-pool-title">AVAILABLE TO ADD (${notSection.length})</div>
      <div class="pool-list" id="pool-out">
        ${notSection.length?notSection.map((p,i)=>poolItem(p,false,i)).join(''):`<div class="empty" style="padding:2rem"><div class="empty-txt">All products are in this section</div></div>`}
      </div>
    </div>
  </div>`;
}

function poolItem(p,inSec,idx){
  return `<div class="pool-item" draggable="${inSec}" data-pid="${p.id}"
    ondragstart="poolDragStart(event)" ondragend="poolDragEnd(event)"
    ondragover="itemDragOver(event)" ondragleave="itemDragLeave(event)">
    <span class="pool-item-drag">${inSec?'⠿':''}</span>
    <div class="prod-list-img" style="width:36px;height:36px;flex-shrink:0">
      ${p.images&&p.images[0]?`<img src="${p.images[0]}" alt="">`:'<span style="font-size:.9rem">👕</span>'}
    </div>
    <div style="flex:1;min-width:0">
      <div class="pool-item-name">${p.name}</div>
      <div class="pool-item-cat">${CAT_MAP[p.cat]?.label||p.cat} · ₹${(p.price||0).toLocaleString('en-IN')}</div>
    </div>
    ${inSec
      ?`<button class="pool-item-btn rem-btn" title="Remove from section" onclick="toggleSection('${p.id}',false)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>`
      :`<button class="pool-item-btn add-btn" title="Add to section" onclick="toggleSection('${p.id}',true)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>`}
  </div>`;
}

function toggleSection(pid, add){
  const prods = getProducts();
  const p = prods.find(x=>x.id===pid);
  if(!p) return;
  const sections = p.sections ? [...p.sections] : [];
  if(add){ if(!sections.includes(activeSectionTab)) sections.push(activeSectionTab); }
  else   { const i=sections.indexOf(activeSectionTab); if(i>-1) sections.splice(i,1); }
  fbSaveProduct({...p, sections}).then(()=>{
    toast(add?'Jersey added to section':'Jersey removed from section');
  });
}

// Drag-and-drop for reorder
let dragPid = null;

function poolDragStart(e){
  dragPid = e.currentTarget.dataset.pid;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function poolDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.pool-item').forEach(el=>el.classList.remove('drag-over'));
}
function poolDragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect='move'; }
function itemDragOver(e){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function itemDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function poolDrop(e,target){
  e.preventDefault();
  if(!dragPid) return;
  const prods = getProducts();
  const overEl = e.target.closest('.pool-item');
  const overPid = overEl?.dataset.pid;
  const inSec = prods.filter(p=>(p.sections||[]).includes(activeSectionTab)).sort((a,b)=>(a.priority||99)-(b.priority||99));
  const fromIdx = inSec.findIndex(p=>p.id===dragPid);
  const toIdx   = overPid ? inSec.findIndex(p=>p.id===overPid) : inSec.length;
  if(fromIdx!==-1&&toIdx!==-1&&fromIdx!==toIdx){
    const [moved] = inSec.splice(fromIdx,1);
    inSec.splice(toIdx,0,moved);
    // Batch write updated priorities to Firestore
    const batch=db.batch();
    inSec.forEach((p,i)=>{
      batch.update(PROD_COL.doc(p.id),{priority:i+1});
    });
    batch.commit().then(()=>toast('Order saved'));
    // Optimistic update in local cache for instant UI feedback
    inSec.forEach((p,i)=>{ const pp=_products.find(x=>x.id===p.id); if(pp) pp.priority=i+1; });
    renderSectionBody();
  }
  dragPid=null;
}

/* ─── PRODUCT MODAL ───────────────────────────────────── */
let editingId = null;
let modalImages = []; // [{data: base64, featured: bool}]

function openModal(id){
  editingId = id||null;
  modalImages = [];
  const prods = getProducts();
  const p = id ? prods.find(x=>x.id===id) : null;

  document.getElementById('modal-mode-label').textContent = id?'Edit Product':'Add Product';
  document.getElementById('modal-title-label').textContent = id?'EDIT JERSEY':'NEW JERSEY';

  // Sizes
  document.querySelectorAll('#size-group .check-pill').forEach(el=>{
    const sz = el.querySelector('input').value;
    const on = p ? (p.sizes||[]).includes(sz) : ['S','M','L','XL'].includes(sz);
    el.classList.toggle('on', on);
    el.querySelector('input').checked = on;
  });

  // Section pills
  document.querySelectorAll('.modal-body .check-pill input[type=checkbox]').forEach(inp=>{
    const pil = inp.closest('.check-pill');
    const on = p ? (p.sections||[]).includes(inp.value) : inp.value==='shop';
    if(pil){ pil.classList.toggle('on',on); inp.checked=on; }
  });

  // Fill fields
  document.getElementById('f-name').value  = p?.name||'';
  document.getElementById('f-cat').value   = p?.cat||'';
  document.getElementById('f-badge').value = p?.badge||'';
  document.getElementById('f-mrp').value   = p?.mrp||'';
  document.getElementById('f-price').value = p?.price||'';
  document.getElementById('f-qty').value   = p?.qty??'';
  document.getElementById('f-status').value= p?.status||'active';
  document.getElementById('f-desc').value  = p?.desc||'';

  // Images
  if(p&&p.images&&p.images.length){
    modalImages = p.images.map((src,i)=>({data:src,featured:i===0}));
    if(modalImages.length>0) modalImages[0].featured=true;
  }
  renderModalImages();
  calcDisc();

  document.getElementById('prod-modal').classList.add('open');
}

function closeModal(){
  document.getElementById('prod-modal').classList.remove('open');
  editingId=null; modalImages=[];
}

function calcDisc(){
  const mrp=parseFloat(document.getElementById('f-mrp').value)||0;
  const price=parseFloat(document.getElementById('f-price').value)||0;
  const el=document.getElementById('disc-preview');
  if(mrp>0&&price>0&&mrp>price){ el.textContent=Math.round((1-price/mrp)*100)+'% off'; }
  else{ el.textContent='—'; }
}

function togglePill(el){
  setTimeout(()=>el.classList.toggle('on',el.querySelector('input').checked),0);
}

function handleImages(input){
  const files = Array.from(input.files);
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const data=e.target.result;
      modalImages.push({data,featured:modalImages.length===0});
      renderModalImages();
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function renderModalImages(){
  const el=document.getElementById('img-preview');
  if(!modalImages.length){el.innerHTML='';return;}
  el.innerHTML=modalImages.map((img,i)=>`
    <div class="img-item ${img.featured?'featured':''}" title="${img.featured?'Featured image':'Click ★ to set as featured'}">
      <img src="${img.data}" alt="">
      <button class="img-star" onclick="setFeatured(${i})" title="Set as featured">★</button>
      <button class="img-del" onclick="delImage(${i})" title="Remove">✕</button>
      ${img.featured?'<div class="img-featured-label">FEATURED</div>':''}
    </div>`).join('');
}

function setFeatured(idx){
  modalImages.forEach((m,i)=>m.featured=i===idx);
  const feat=modalImages.splice(idx,1)[0];
  modalImages.unshift(feat);
  renderModalImages();
}

function delImage(idx){
  modalImages.splice(idx,1);
  if(modalImages.length>0) modalImages[0].featured=true;
  renderModalImages();
}

function saveProduct(){
  const name=document.getElementById('f-name').value.trim();
  const cat=document.getElementById('f-cat').value;
  const mrp=parseFloat(document.getElementById('f-mrp').value);
  const price=parseFloat(document.getElementById('f-price').value);
  if(!name){toast('Product title is required','danger');return;}
  if(!cat){toast('Please select a category','danger');return;}
  if(!mrp||!price){toast('Please enter both MRP and selling price','danger');return;}
  if(price>=mrp){toast('Selling price must be less than MRP','danger');return;}

  const sizes=[...document.querySelectorAll('#size-group .check-pill input:checked')].map(i=>i.value);
  const sections=[...document.querySelectorAll('.modal-body .check-pill input[type=checkbox]:checked')].map(i=>i.value);
  const prods=getProducts();

  // Compress images before saving to Firestore
  Promise.all(modalImages.map(m=>compressImage(m.data))).then(async compressed=>{
    const images = compressed;
    if(editingId){
      const existing = prods.find(p=>p.id===editingId)||{};
      const updated = {
        ...existing,
        name,cat,mrp,price,
        badge:document.getElementById('f-badge').value.trim(),
        qty:parseInt(document.getElementById('f-qty').value)||0,
        status:document.getElementById('f-status').value,
        desc:document.getElementById('f-desc').value.trim(),
        sizes,sections,images,
      };
      await fbSaveProduct(updated);
      toast('Product updated successfully!','success');
    } else {
      const newP={
        id:'p'+Date.now(),
        name,cat,mrp,price,
        badge:document.getElementById('f-badge').value.trim(),
        qty:parseInt(document.getElementById('f-qty').value)||0,
        status:document.getElementById('f-status').value,
        desc:document.getElementById('f-desc').value.trim(),
        sizes,sections,images,
        priority:prods.length+1,
      };
      await fbSaveProduct(newP);
      toast('Product added!','success');
    }
    closeModal();
    // onSnapshot will trigger re-render automatically
  }).catch(e=>{ console.error(e); toast('Save failed — check console','danger'); });
}

function deleteProduct(id){
  const prods=getProducts();
  const p=prods.find(x=>x.id===id);
  confirm2(`Delete "${p?.name||'this product'}"? This cannot be undone.`,async ()=>{
    await fbDeleteProduct(id);
    toast('Product deleted','danger');
    // onSnapshot re-renders automatically
  });
}

/* ─── TOAST ──────────────────────────────────────────── */
function toast(msg,type=''){
  const wrap=document.getElementById('toast-wrap');
  const el=document.createElement('div');
  el.className=`toast ${type?'t-'+type:''}`;
  el.textContent=msg;
  wrap.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),400);},3000);
}

/* ─── CONFIRM ─────────────────────────────────────────── */
let confirmResolve = ()=>{};
function confirm2(txt, cb){
  document.getElementById('confirm-txt').textContent=txt;
  document.getElementById('confirm-overlay').classList.add('open');
  confirmResolve=(yes)=>{
    document.getElementById('confirm-overlay').classList.remove('open');
    if(yes) cb();
  };
}

/* ─── SIDEBAR COUNTS ─────────────────────────────────── */
function updateSidebarCounts(){
  document.getElementById('sb-prod-count').textContent=_products.length;
}

/* ─── DRAG UPLOAD AREA ───────────────────────────────── */
const uploadArea=document.getElementById('upload-area');
['dragenter','dragover'].forEach(ev=>uploadArea.addEventListener(ev,e=>{e.preventDefault();uploadArea.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>uploadArea.addEventListener(ev,e=>{e.preventDefault();uploadArea.classList.remove('drag');}));
uploadArea.addEventListener('drop',e=>{
  const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
  const fakeInput={files,value:''};
  handleImages(fakeInput);
});

/* ─── MODAL ESC CLOSE ─────────────────────────────────── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeModal();
    document.getElementById('confirm-overlay').classList.remove('open');
  }
});
document.getElementById('prod-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('prod-modal')) closeModal();
});

/* ─── INIT ────────────────────────────────────────────── */
// Show skeleton dashboard immediately, Firebase data fills in via onSnapshot
navigate('dashboard');
// Seed Firestore if this is first launch
seedIfEmpty().catch(e=>{ console.error('Seed error:',e); hideSeedingBanner(); });
</script>
